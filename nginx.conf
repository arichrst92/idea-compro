# /etc/nginx/sites-available/idea-website
# Replace 'yourdomain.com' with your actual domain

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS (after SSL setup)
    # return 301 https://$host$request_uri;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # Static files — serve directly from Nginx for performance
    location /css/ {
        alias /var/www/idea-website/public/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /js/ {
        alias /var/www/idea-website/public/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /images/ {
        alias /var/www/idea-website/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /fonts/ {
        alias /var/www/idea-website/public/fonts/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Admin panel — restrict by IP in production (optional)
    # Uncomment and set your office/home IP to block public access:
    # location /admin {
    #     allow YOUR_IP_ADDRESS;
    #     deny all;
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Proxy to Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Sitemap & robots
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000/api/robots.txt;
    }
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000/api/sitemap.xml;
    }

    # Legacy WordPress URL redirects — preserve SEO juice from old site
    # Block apa pun yang masih nyangkut di Google index lama
    location ~ ^/tag/ { return 301 /blog; }
    location ~ ^/category/ { return 301 /blog; }
    location ~ ^/author/ { return 301 /about; }
    location ~ ^/(wp-content|wp-includes|wp-admin|wp-login\.php|xmlrpc\.php|wp-json) { return 301 /; }
    location ~* \.(php|asp|aspx|jsp)$ { return 301 /; }
    # Old date-based archives
    location ~ ^/[0-9]{4}/[0-9]{2}/ { return 301 /blog; }
}

# HTTPS block — enable after certbot
