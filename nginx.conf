# /etc/nginx/sites-available/idea-website
# Production config for ide.asia — HTTP→HTTPS redirect + HTTPS proxy ke Node
# Cert dikelola certbot di /etc/letsencrypt/live/ide.asia/

# ─── HTTP (port 80) — redirect semua ke HTTPS ───
server {
    listen 80;
    listen [::]:80;
    server_name ide.asia www.ide.asia;

    # ACME challenge tetap di HTTP supaya certbot bisa renew
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (port 443) — production ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ide.asia www.ide.asia;

    ssl_certificate     /etc/letsencrypt/live/ide.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ide.asia/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # Static — served by Nginx directly
    location /css/    { alias /var/www/idea-website/public/css/;    expires 7d;  add_header Cache-Control "public, immutable"; access_log off; }
    location /js/     { alias /var/www/idea-website/public/js/;     expires 7d;  add_header Cache-Control "public, immutable"; access_log off; }
    location /images/ { alias /var/www/idea-website/public/images/; expires 30d; add_header Cache-Control "public, immutable"; access_log off; }
    location /fonts/  { alias /var/www/idea-website/public/fonts/;  expires 30d; add_header Cache-Control "public, immutable"; access_log off; }
    location /audio/  { alias /var/www/idea-website/public/audio/;  expires 30d; add_header Cache-Control "public, immutable"; access_log off; }
    location /models/ { alias /var/www/idea-website/public/models/; expires 30d; add_header Cache-Control "public, immutable"; access_log off; }

    # Sitemap & robots → proxy ke endpoint API Node
    location = /robots.txt  { proxy_pass http://127.0.0.1:3000/api/robots.txt; }
    location = /sitemap.xml { proxy_pass http://127.0.0.1:3000/api/sitemap.xml; }

    # Legacy WordPress URL — preserve SEO juice
    location ~ ^/tag/      { return 301 /blog; }
    location ~ ^/category/ { return 301 /blog; }
    location ~ ^/author/   { return 301 /about; }
    location ~ ^/(wp-content|wp-includes|wp-admin|wp-login\.php|xmlrpc\.php|wp-json) { return 301 /; }
    location ~* \.(php|asp|aspx|jsp)$ { return 301 /; }
    location ~ "^/[0-9]{4}/[0-9]{2}/" { return 301 /blog; }

    # Proxy semua route lainnya ke Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
